image: node:20

# Force-push marker for pipeline retrigger.
options:
  max-time: 20

definitions:
  caches:
    npm: ~/.npm
  steps:
    - step: &verify
        name: Verify (lint, typecheck, test, build)
        caches:
          - npm
        script:
          - npm ci
          - npm run verify

pipelines:
  default:
    - step: *verify

  pull-requests:
    "**":
      - step: *verify

  branches:
    main:
      - step: *verify
