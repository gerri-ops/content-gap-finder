image: node:20

options:
  max-time: 20

definitions:
  caches:
    npm: ~/.npm
  steps:
    - step: &verify
        name: Verify (lint, typecheck, test, build)
        caches:
          - npm
        script:
          - npm ci
          - npm run verify

pipelines:
  default:
    - step: *verify

  pull-requests:
    "**":
      - step: *verify

  branches:
    main:
      - step: *verify
      - step:
          name: Deploy to Staging
          deployment: staging
          caches:
            - npm
          script:
            - npm ci
            - npm run build
            - echo "Staging deployment step completed for commit ${BITBUCKET_COMMIT}."
